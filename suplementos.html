<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suplementos | X1 FIT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="background: #000;">

    <header>
        <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:bold; position:absolute; left:20px;"><i class="fas fa-chevron-left"></i> Voltar</a>
        <div class="logo">X1<span>FIT</span></div>
    </header>

    <section style="padding: 80px 20px 40px; text-align: center;">
        <h2 style="font-weight:900; color:white; margin-bottom:10px;">TABELA DE <span>PREÇOS</span></h2>
        <p style="color:#888; font-size:0.8rem;">Produtos disponíveis para retirada na recepção</p>
    </section>

    <section style="padding: 0 20px;">
        <div style="background:#111; border:1px solid #222; border-radius:15px; padding:20px; margin-bottom:15px; display:flex; align-items:center; justify-content:space-between;">
            <div>
                <h3 style="color:white; font-size:1rem;">Whey Protein (900g)</h3>
                <p style="color:var(--primary); font-weight:900; margin-top:5px;">R$ 00,00</p>
            </div>
            <i class="fas fa-pills" style="color:#333; font-size:1.5rem;"></i>
        </div>

        <div style="background:#111; border:1px solid #222; border-radius:15px; padding:20px; margin-bottom:15px; display:flex; align-items:center; justify-content:space-between;">
            <div>
                <h3 style="color:white; font-size:1rem;">Creatina Pure (300g)</h3>
                <p style="color:var(--primary); font-weight:900; margin-top:5px;">R$ 00,00</p>
            </div>
            <i class="fas fa-flask" style="color:#333; font-size:1.5rem;"></i>
        </div>

        <div style="border: 2px dashed #333; padding: 20px; border-radius: 15px; text-align: center; color: #555;">
            <p style="font-size:0.8rem;">Aqui adicionaremos todos os outros produtos que você vende...</p>
        </div>
    </section>

</body>
</html>
